name: Mobile CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck workspaces
        run: npm run typecheck
